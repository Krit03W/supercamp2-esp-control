<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>ESP32 Robot Control</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2230;
    --panel-2: #232d3f;
    --accent: #2dd4bf;
    --accent-press: #14b8a6;
    --danger: #f87171;
    --text: #e6edf3;
    --muted: #8b98a9;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid #000;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); transition: background .2s; }
  .dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .cfg { background: var(--panel-2); color: var(--text); border: 1px solid #333; border-radius: 8px; padding: 4px 8px; font-size: 12px; width: 150px; }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    min-height: 0;
  }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel h2 { margin: 0 0 10px; font-size: 14px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

  /* ---- กล้อง ---- */
  .cam-wrap {
    flex: 1; background: #000; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .cam-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .cam-placeholder { color: var(--muted); font-size: 14px; text-align: center; padding: 20px; }

  /* ---- ปุ่มควบคุม ---- */
  .ctrl-scroll { overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
  .group { background: var(--panel-2); border-radius: 12px; padding: 12px; }
  .group-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    max-width: 260px;
    margin: 0 auto;
  }
  .dpad .up    { grid-area: 1 / 2; }
  .dpad .left  { grid-area: 2 / 1; }
  .dpad .stop  { grid-area: 2 / 2; }
  .dpad .right { grid-area: 2 / 3; }
  .dpad .down  { grid-area: 3 / 2; }

  button.btn {
    background: var(--panel);
    color: var(--text);
    border: 1px solid #354259;
    border-radius: 12px;
    padding: 16px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    transition: background .08s, transform .08s;
    touch-action: none;
  }
  button.btn:active, button.btn.pressed {
    background: var(--accent-press);
    border-color: var(--accent);
    transform: scale(0.96);
  }
  button.btn.stop { background: #3a2330; border-color: #5a2a3a; color: var(--danger); }

  .row { display: flex; gap: 8px; }
  .row button.btn { flex: 1; font-size: 15px; padding: 14px; }

  .axis-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .axis-row .label { width: 70px; font-size: 14px; color: var(--text); }
  .axis-row button.btn { flex: 1; padding: 12px; font-size: 18px; }

  .toggle { width: 100%; padding: 16px; font-size: 16px; }
  .toggle.active { background: var(--accent-press); border-color: var(--accent); color: #fff; }

  .log { font-size: 11px; color: var(--muted); font-family: monospace; height: 48px; overflow-y: auto; background: #0b0f16; border-radius: 8px; padding: 6px 8px; }
</style>
</head>
<body>
  <header>
    <h1>🤖 ESP32 Robot Control</h1>
    <div class="status">
      <input id="cfgCtrl"  class="cfg" placeholder="ws://192.168.4.1:81" title="WebSocket ESP32 ตัวคุม" />
      <input id="cfgCam"   class="cfg" placeholder="http://192.168.4.2:81/stream" title="ESP32-CAM stream" />
      <button class="btn" style="padding:6px 10px;font-size:13px" onclick="applyConfig()">เชื่อมต่อ</button>
      <span class="dot" id="dot"></span><span id="statusText">ไม่ได้เชื่อมต่อ</span>
    </div>
  </header>

  <main>
    <!-- ฝั่งกล้อง -->
    <section class="panel">
      <h2>📷 กล้อง ESP32-CAM</h2>
      <div class="cam-wrap">
        <div class="cam-placeholder" id="camPlaceholder">ใส่ URL สตรีมแล้วกด "เชื่อมต่อ"<br>เพื่อดูภาพจากกล้อง</div>
        <img id="cam" alt="" style="display:none" />
      </div>
    </section>

    <!-- ฝั่งควบคุม -->
    <section class="panel">
      <h2>🎮 แผงควบคุม</h2>
      <div class="ctrl-scroll">

        <!-- การเคลื่อนที่ -->
        <div class="group">
          <div class="group-title">การเคลื่อนที่ (กดค้างเพื่อเดิน, ปล่อยเพื่อหยุด)</div>
          <div class="dpad">
            <button class="btn up"    data-hold="forward">▲</button>
            <button class="btn left"  data-hold="left">◀</button>
            <button class="btn stop"  data-cmd="stop">■</button>
            <button class="btn right" data-hold="right">▶</button>
            <button class="btn down"  data-hold="backward">▼</button>
          </div>
        </div>

        <!-- ไฟ -->
        <div class="group">
          <div class="group-title">ไฟ</div>
          <button class="btn toggle" id="lightBtn" onclick="toggleLight()">💡 เปิด/ปิดไฟ</button>
        </div>

        <!-- Gripper 3 แกน -->
        <div class="group">
          <div class="group-title">Gripper (3 แกน)</div>
          <div class="axis-row">
            <span class="label">ฐานหมุน</span>
            <button class="btn" data-hold="base_minus">−</button>
            <button class="btn" data-hold="base_plus">+</button>
          </div>
          <div class="axis-row">
            <span class="label">แขน</span>
            <button class="btn" data-hold="arm_minus">−</button>
            <button class="btn" data-hold="arm_plus">+</button>
          </div>
          <div class="axis-row">
            <span class="label">ข้อมือ</span>
            <button class="btn" data-hold="wrist_minus">−</button>
            <button class="btn" data-hold="wrist_plus">+</button>
          </div>
        </div>

        <!-- หยิบ-จับ -->
        <div class="group">
          <div class="group-title">มือจับ (Gripper)</div>
          <div class="row">
            <button class="btn" data-cmd="grip_open">✋ ปล่อย</button>
            <button class="btn" data-cmd="grip_close">🤏 หยิบ</button>
          </div>
        </div>

        <div class="log" id="log"></div>
      </div>
    </section>
  </main>

<script>
/* ===================== การตั้งค่า ===================== */
let CTRL_URL = localStorage.getItem('ctrlUrl') || 'ws://192.168.4.1:81';
let CAM_URL  = localStorage.getItem('camUrl')  || 'http://192.168.4.2:81/stream';
let ws = null, lightOn = false;

const $ = id => document.getElementById(id);
const dot = $('dot'), statusText = $('statusText');

function logMsg(t) {
  const el = $('log');
  el.innerHTML = `<div>${new Date().toLocaleTimeString()} → ${t}</div>` + el.innerHTML;
}

/* ===================== WebSocket ===================== */
function connect() {
  if (ws) { try { ws.close(); } catch (e) {} }
  try { ws = new WebSocket(CTRL_URL); }
  catch (e) { statusText.textContent = 'URL ไม่ถูกต้อง'; return; }

  ws.onopen    = () => { dot.classList.add('on');  statusText.textContent = 'เชื่อมต่อแล้ว'; logMsg('เชื่อมต่อ ' + CTRL_URL); };
  ws.onclose   = () => { dot.classList.remove('on'); statusText.textContent = 'หลุดการเชื่อมต่อ'; };
  ws.onerror   = () => { statusText.textContent = 'เชื่อมต่อล้มเหลว'; };
  ws.onmessage = e => logMsg('← ' + e.data);
}

function send(cmd, value) {
  const payload = JSON.stringify(value === undefined ? { cmd } : { cmd, value });
  if (ws && ws.readyState === WebSocket.OPEN) { ws.send(payload); logMsg('↗ ' + payload); }
  else logMsg('⚠ ยังไม่เชื่อมต่อ: ' + payload);
}

/* ===================== กล้อง ===================== */
function startCam() {
  const img = $('cam'), ph = $('camPlaceholder');
  img.src = CAM_URL + (CAM_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
  img.onload  = () => { img.style.display = 'block'; ph.style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none';  ph.style.display = 'block'; ph.textContent = 'ต่อกล้องไม่ได้: ' + CAM_URL; };
}

/* ===================== config ===================== */
function applyConfig() {
  const c = $('cfgCtrl').value.trim(), m = $('cfgCam').value.trim();
  if (c) { CTRL_URL = c; localStorage.setItem('ctrlUrl', c); }
  if (m) { CAM_URL  = m; localStorage.setItem('camUrl', m); }
  connect();
  startCam();
}

/* ===================== ไฟ ===================== */
function toggleLight() {
  lightOn = !lightOn;
  $('lightBtn').classList.toggle('active', lightOn);
  send('light', lightOn ? 'on' : 'off');
}

/* ===================== ผูกปุ่ม ===================== */
// ปุ่มกดครั้งเดียว
document.querySelectorAll('[data-cmd]').forEach(b => {
  b.addEventListener('click', () => send(b.dataset.cmd));
});

// ปุ่มกดค้าง: pointerdown=เริ่ม, pointerup/leave=หยุด
document.querySelectorAll('[data-hold]').forEach(b => {
  const action = b.dataset.hold;
  const start = e => { e.preventDefault(); b.classList.add('pressed'); send('move', action); };
  const stop  = e => { if (!b.classList.contains('pressed')) return; b.classList.remove('pressed'); send('move', 'stop'); };
  b.addEventListener('pointerdown', start);
  b.addEventListener('pointerup', stop);
  b.addEventListener('pointerleave', stop);
  b.addEventListener('pointercancel', stop);
});

// หยุดทุกอย่างเมื่อสลับแท็บ (กันหุ่นเดินค้าง)
document.addEventListener('visibilitychange', () => { if (document.hidden) send('move', 'stop'); });

/* ===================== เริ่ม ===================== */
$('cfgCtrl').value = CTRL_URL;
$('cfgCam').value  = CAM_URL;
</script>
</body>
</html>
