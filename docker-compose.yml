services:
  relay:
    build:
      context: ./server
      dockerfile: Dockerfile        # Node + Python venv (opencv + openai) สำหรับ Krit AI
    restart: unless-stopped
    environment:
      # --- ควบคุมหุ่น ---
      AUTH_TOKEN: ${AUTH_TOKEN:-}          # รหัสลับ ต้องตรงกับฝั่ง ESP32 และหน้าเว็บ
      PORT: 8080

      # --- Krit AI (สแกน rune) ---
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}          # ใส่ใน Dokploy → Environment (ถ้าเว้นว่าง จะใช้ได้แค่ AprilTag ออฟไลน์)
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      PYTHON_BIN: python3                          # ตรงกับ venv ใน Dockerfile
    expose:
      - "8080"
    # Dokploy map โดเมน -> service "relay" พอร์ต 8080 ผ่านหน้า UI (Domains)
    # ไม่ต้อง publish host port เอง ปล่อยให้ Traefik จัดการ HTTPS/wss

    # เช็คสุขภาพด้วย /health (ใช้ node ในตัว ไม่ต้องมี curl)
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
